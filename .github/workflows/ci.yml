name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, macos-26-intel, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  linux:
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.7-jammy", "5.10-noble", "6.0-noble", "6.1-noble", "6.2-noble", "6.3-noble"]
        runner: [ubuntu-24.04-arm, ubuntu-24.04]
    runs-on: ${{ matrix.runner }}
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
